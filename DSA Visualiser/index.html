<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoLens | Sorting Visualiser</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-card">
        <h2>AlgoLens</h2>
        <p>Visualise Sorting Algorithm </p>
        <div class="input-place common-class-properties">
            <h3>Enter Numbers: </h3>
            <input type="text" id="input-box" placeholder="Enter numbers..." />
        </div>
        <div class="algorithm-selector common-class-properties">
            <label for="algo-selector">Select an algorithm: </label>
            <select name="algorithm-selector" id="algo-selector">
                <option value="bubble-sort">Bubble Sort</option>
                <option value="selection-sort">Selection Sort</option>
                <option value="insertion-sort">Insertion Sort</option>
                <option value="merge-sort">Merge Sort</option>
                <option value="quick-sort">Quick Sort</option>
                <option value="heap-sort">Heap Sort</option>
            </select>
        </div>
        <div class="sorting-button">
            <button id="sorting-btn">Visualise Sorting</button>
        </div>
        <div class="sorting-steps common-class-properties">
            <h4>Sorting Process</h4>
            <div id="sorting-steps-process">
                No visualisation generated yet. Enter numbers and click Visualise Sorting.
            </div>
        </div>
        <div class="output-box common-class-properties">
            <h4>Final Sorted Array</h4>
            <p id="final-output-msg">
                Final output array will be displayed here.
            </p>
        </div>
    </div>
    <script src="algorithm.js"></script>
    <script src="script.js"></script>
</body>

</html>
